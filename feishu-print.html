<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>莫比乌斯素金镯标签 (30mm×25mm 打印版)</title>
    <!-- 飞书多维表格 SDK -->
    <script src="lark-sdk.umd.js" defer></script>
    <!-- JsBarcode 条形码生成库 -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 屏幕预览样式：卡片放大显示，便于操作，但打印时恢复原始尺寸 */
        body {
            background: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            padding: 20px;
        }

        /* 标签卡片 - 屏幕预览时放大到宽度150mm（约5倍），但保持比例 */
        .label-card {
            width: 150mm;          /* 预览放大 */
            height: 125mm;         /* 25mm * 5 = 125mm */
            background: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            padding: 7.5mm 10mm;   /* 按比例放大内边距 */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.2s;
            border-radius: 4px;
        }

        /* 打印样式：恢复原始30mm×25mm尺寸 */
        @media print {
            body {
                background: none;
                padding: 0;
                margin: 0;
            }
            .label-card {
                box-shadow: none;
                margin: 0;
                padding: 1.5mm 2mm;
                width: 30mm;
                height: 25mm;
                page-break-after: avoid;
                break-inside: avoid;
                border-radius: 0;
            }
            @page {
                size: 30mm 25mm;
                margin: 0mm;
            }
            .no-print {
                display: none !important;
            }
        }

        /* 标题区 */
        .title {
            font-size: 5.5mm;      /* 预览放大时字体也相应放大 */
            font-weight: bold;
            text-align: center;
            border-bottom: 0.5mm solid #333;
            padding-bottom: 1mm;
            margin-bottom: 2mm;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        @media print {
            .title {
                font-size: 3.5mm;
                border-bottom: 0.3mm solid #333;
                padding-bottom: 0.5mm;
                margin-bottom: 1mm;
            }
        }

        /* 信息行列表 */
        .info-list {
            flex: 1;
            font-size: 4.2mm;
            line-height: 1.4;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.2mm;
        }
        .info-label {
            font-weight: 600;
            color: #2c3e50;
        }
        .info-value {
            color: #0b1f33;
            text-align: right;
            max-width: 60%;
            word-break: break-all;
        }
        @media print {
            .info-list {
                font-size: 2.8mm;
                line-height: 1.3;
            }
            .info-row {
                margin-bottom: 0.8mm;
            }
        }

        /* 条形码区域 */
        .barcode-area {
            margin-top: 2mm;
            text-align: center;
            border-top: 0.4mm dashed #aaa;
            padding-top: 1.5mm;
        }
        .barcode-area svg {
            width: 100%;
            height: auto;
            max-height: 10mm;
        }
        .barcode-number {
            font-size: 3mm;
            text-align: center;
            margin-top: 1mm;
            color: #555;
        }
        @media print {
            .barcode-area {
                margin-top: 1mm;
                border-top: 0.2mm dashed #aaa;
                padding-top: 0.8mm;
            }
            .barcode-area svg {
                max-height: 6mm;
            }
            .barcode-number {
                font-size: 2mm;
                margin-top: 0.5mm;
            }
        }

        /* 操作按钮组 (不打印) */
        .btn-group {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            color: white;
            background: #007fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .btn-success {
            background: #2ecc71;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .error-tip {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #ffebee;
            border-left: 4px solid #d32f2f;
            padding: 8px 12px;
            font-size: 12px;
            color: #b71c1c;
            z-index: 9999;
            display: none;
        }
    </style>
</head>
<body>
    <div class="btn-group no-print">
        <button class="btn" onclick="selectAndLoadData()">📋 选择记录</button>
        <button class="btn btn-success" onclick="printLabel()">🖨️ 打印标签</button>
    </div>
    <div id="errorTip" class="error-tip no-print"></div>

    <!-- 标签主体 -->
    <div class="label-card" id="labelCard">
        <div class="title" id="titleField">莫比乌斯素金镯</div>
        <div class="info-list">
            <div class="info-row"><span class="info-label">主石</span><span class="info-value" id="mainStone"></span></div>
            <div class="info-row"><span class="info-label">副石</span><span class="info-value" id="subStone"></span></div>
            <div class="info-row"><span class="info-label">金重</span><span class="info-value" id="goldWeight"></span></div>
            <div class="info-row"><span class="info-label">件重</span><span class="info-value" id="itemWeight"></span></div>
            <div class="info-row"><span class="info-label">件工费</span><span class="info-value" id="laborCost"></span></div>
        </div>
        <div class="barcode-area">
            <svg id="barcode"></svg>
            <div class="barcode-number" id="barcodeText"></div>
        </div>
    </div>

    <script>
        // ---------- 全局变量 ----------
        let currentRecordData = null;

        function showError(msg) {
            const errDiv = document.getElementById('errorTip');
            errDiv.textContent = `❌ ${msg}`;
            errDiv.style.display = 'block';
            setTimeout(() => { errDiv.style.display = 'none'; }, 5000);
            console.error(msg);
        }

        // 通用字段提取函数
        function extractFieldValue(fields, fieldId, rule) {
            if (!fields || !fieldId) return '';
            const raw = fields[fieldId];
            if (raw === undefined || raw === null) return '';
            
            if (rule === 'firstText') {
                if (Array.isArray(raw) && raw.length > 0) {
                    const first = raw[0];
                    if (first && typeof first === 'object' && first.text !== undefined) return first.text;
                    return String(first);
                } else if (typeof raw === 'object' && raw !== null && raw.text !== undefined) {
                    return raw.text;
                }
                return String(raw);
            }
            else if (rule === 'firstValue') {
                if (Array.isArray(raw) && raw.length > 0) {
                    const first = raw[0];
                    if (first && typeof first === 'object' && first.value !== undefined) return first.value;
                    return String(first);
                } else if (typeof raw === 'object' && raw !== null && raw.value !== undefined) {
                    return raw.value;
                }
                return String(raw);
            }
            else if (rule === 'number') {
                const num = parseFloat(raw);
                return isNaN(num) ? '' : num;
            }
            else {
                return typeof raw === 'object' ? JSON.stringify(raw) : String(raw);
            }
        }

        // 生成条形码
        function generateBarcode(code) {
            if (!code) {
                document.getElementById('barcode').innerHTML = '';
                document.getElementById('barcodeText').innerText = '';
                return;
            }
            try {
                JsBarcode("#barcode", code, {
                    format: "CODE128",
                    width: 0.8,
                    height: 5,
                    displayValue: false,
                    fontSize: 2,
                    margin: 0
                });
                document.getElementById('barcodeText').innerText = code;
            } catch (e) {
                console.warn("条形码生成失败", e);
                document.getElementById('barcode').innerHTML = '';
                document.getElementById('barcodeText').innerText = code || '';
            }
        }

        // 清空所有字段
        function clearFields() {
            document.getElementById('titleField').innerText = '莫比乌斯素金镯';
            document.getElementById('mainStone').innerText = '';
            document.getElementById('subStone').innerText = '';
            document.getElementById('goldWeight').innerText = '';
            document.getElementById('itemWeight').innerText = '';
            document.getElementById('laborCost').innerText = '';
            generateBarcode('');
        }

        function formatNumber(val) {
            if (val === '' || val === null || val === undefined) return '';
            const num = parseFloat(val);
            if (isNaN(num)) return '';
            return num.toFixed(2);
        }

        function fillLabelFromRecord(record) {
            const fields = record.fields || {};
            console.log("========== 选中的记录对象 ==========");
            console.log("完整记录:", record);
            console.table(fields);

            // 顶部标题
            let title = extractFieldValue(fields, 'fldtJkkbfh', 'firstText');
            if (title) document.getElementById('titleField').innerText = title;
            else document.getElementById('titleField').innerText = '莫比乌斯素金镯';

            // 主石
            let mainStone = extractFieldValue(fields, 'fldbSFpb12', 'firstValue');
            document.getElementById('mainStone').innerText = mainStone;

            // 副石
            let subStone = extractFieldValue(fields, 'fld4wV6xia', 'direct');
            document.getElementById('subStone').innerText = subStone;

            // 金重
            let goldWeight = extractFieldValue(fields, 'fld6ebcnhJ', 'number');
            document.getElementById('goldWeight').innerText = formatNumber(goldWeight);

            // 件重
            let itemWeight = extractFieldValue(fields, 'fldbggr87e', 'firstValue');
            document.getElementById('itemWeight').innerText = formatNumber(itemWeight);

            // 件工费
            let laborCost = extractFieldValue(fields, 'fld9TBU8tn', 'number');
            document.getElementById('laborCost').innerText = formatNumber(laborCost);

            // 产品编码 -> 条形码
            let productCode = extractFieldValue(fields, 'fldRKqKb64', 'firstText');
            if (productCode) generateBarcode(productCode);
            else generateBarcode('');
        }

        async function selectAndLoadData() {
            try {
                if (!window.bitable || !window.bitable.base || !window.bitable.ui) {
                    throw new Error('飞书SDK未加载，请确保在飞书多维表格环境中运行');
                }
                const base = window.bitable.base;
                const selection = await base.getSelection();
                let tableId = selection?.tableId;
                let viewId = selection?.viewId;
                if (!tableId) {
                    const activeTable = await base.getActiveTable();
                    tableId = activeTable?.id;
                    viewId = activeTable?.activeViewId;
                }
                if (!tableId || !viewId) {
                    throw new Error('无法获取当前表格或视图');
                }
                const selectedIds = await window.bitable.ui.selectRecordIdList(tableId, viewId);
                if (!selectedIds || selectedIds.length === 0) {
                    throw new Error('未选择任何记录');
                }
                const targetId = selectedIds[0];
                if (selectedIds.length > 1) console.warn('选择了多条记录，仅加载第一条');
                
                const table = await base.getActiveTable();
                let record = null;
                try {
                    record = await table.getRecordById(targetId);
                } catch (err) {
                    const recordsData = await table.getRecordList();
                    let recordsArray = [];
                    if (Array.isArray(recordsData)) recordsArray = recordsData;
                    else if (recordsData?.recordList) recordsArray = recordsData.recordList;
                    else if (recordsData?.records) recordsArray = recordsData.records;
                    record = recordsArray.find(r => {
                        const id = r.recordId || r.id || r._id;
                        return String(id) === String(targetId);
                    });
                }
                if (!record) throw new Error('未找到对应的记录');
                
                const fullRecord = {
                    recordId: targetId,
                    fields: record.fields || record,
                    rawRecord: record
                };
                currentRecordData = fullRecord;
                fillLabelFromRecord(fullRecord);
            } catch (err) {
                console.error(err);
                showError(err.message);
            }
        }

        function printLabel() {
            if (!currentRecordData) {
                showError('请先选择一条记录再打印');
                return;
            }
            window.print();
        }

        window.onload = function() {
            clearFields();
            console.log("标签模版已加载，屏幕预览已放大，打印尺寸仍为30mm×25mm");
        };
    </script>
</body>
</html>

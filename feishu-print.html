<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>莫比乌斯素金镯标签 (右移2mm 行距0.45mm)</title>
    <script src="lark-sdk.umd.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #e9ecef;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            padding: 20px;
        }
        .label-card {
            width: 125mm;
            height: 150mm;
            background: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            padding: 4mm 6mm;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            border-radius: 4px;
            page-break-after: avoid;
        }
        @media print {
            body {
                background: none;
                padding: 0;
                margin: 0;
            }
            .label-card {
                box-shadow: none;
                margin: 0;
                padding: 1mm 1.5mm 1mm 3.5mm;  /* 左内边距增加到3.5mm (相比原来增加2mm) */
                width: 25mm;
                height: 30mm;
                page-break-after: always;
                border-radius: 0;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
            }
            @page {
                size: 25mm 30mm;
                margin: 0mm;
                page-orientation: portrait;
            }
            .no-print { display: none !important; }
            .title {
                font-size: 2.4mm;
                font-weight: bold;
                text-align: center;
                border-bottom: none;
                padding-bottom: 0.1mm;
                margin-bottom: 0.4mm;
            }
            .info-list {
                font-size: 2.0mm;
                line-height: 1.2;
            }
            .info-row {
                display: flex;
                justify-content: space-between;
                margin-bottom: 0.45mm !important;  /* 行距增加到0.45mm */
                padding: 0 0.5mm;
            }
            .info-label {
                font-weight: 600;
                padding-left: 0.8mm;
            }
            .info-value {
                text-align: right;
                padding-right: 0.8mm;
            }
            .barcode-area {
                margin-top: 0.2mm;
                padding-top: 0mm;
                border-top: 0.1mm dashed #aaa;
                text-align: center;
            }
            .barcode-area svg {
                max-width: 85%;
                max-height: 6.5mm;
                width: auto;
                height: auto;
                display: block;
                margin: 0 auto;
            }
            .barcode-number {
                font-size: 1.4mm;
                margin-top: 0.1mm;
                margin-bottom: 0.1mm;
                text-align: center;
                padding-bottom: 0.1mm;
            }
        }
        /* 屏幕预览样式 */
        .title {
            font-size: 5mm;
            font-weight: bold;
            text-align: center;
            border-bottom: none;
            padding-bottom: 0.5mm;
            margin-bottom: 1.2mm;
        }
        .info-list {
            flex: 1;
            font-size: 3.6mm;
            line-height: 1.35;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1mm;
            padding: 0 1mm;
        }
        .info-label { font-weight: 600; color: #2c3e50; padding-left: 1mm; }
        .info-value { color: #0b1f33; text-align: right; padding-right: 1mm; }
        .barcode-area {
            margin-top: 1.2mm;
            text-align: center;
            border-top: 0.3mm dashed #aaa;
            padding-top: 0.8mm;
        }
        .barcode-area svg { width: auto; max-width: 90%; height: auto; max-height: 7mm; }
        .barcode-number { font-size: 2.5mm; text-align: center; margin-top: 0.4mm; color: #555; }
        .btn-group {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            color: white;
            background: #007fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .btn-success { background: #2ecc71; }
        .btn:hover { opacity: 0.9; }
        .error-tip {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #ffebee;
            border-left: 4px solid #d32f2f;
            padding: 8px 12px;
            font-size: 12px;
            color: #b71c1c;
            z-index: 9999;
            display: none;
        }
    </style>
</head>
<body>
    <div class="btn-group no-print">
        <button class="btn" onclick="selectAndLoadData()">📋 选择记录（可多选）</button>
        <button class="btn btn-success" onclick="printLabels()">🖨️ 批量打印</button>
    </div>
    <div id="errorTip" class="error-tip no-print"></div>
    <div id="labelsContainer"></div>

    <script>
        let selectedRecordsData = [];
        function showError(msg) {
            const errDiv = document.getElementById('errorTip');
            errDiv.textContent = `❌ ${msg}`;
            errDiv.style.display = 'block';
            setTimeout(() => { errDiv.style.display = 'none'; }, 5000);
            console.error(msg);
        }
        function extractFieldValue(fields, fieldId, rule) {
            if (!fields || !fieldId) return '';
            const raw = fields[fieldId];
            if (raw === undefined || raw === null) return '';
            if (rule === 'firstText') {
                if (Array.isArray(raw) && raw.length > 0) {
                    const first = raw[0];
                    if (first && typeof first === 'object' && first.text !== undefined) return first.text;
                    return String(first);
                } else if (typeof raw === 'object' && raw !== null && raw.text !== undefined) return raw.text;
                return String(raw);
            } else if (rule === 'firstValue') {
                if (Array.isArray(raw) && raw.length > 0) {
                    const first = raw[0];
                    if (first && typeof first === 'object' && first.value !== undefined) return first.value;
                    return String(first);
                } else if (typeof raw === 'object' && raw !== null && raw.value !== undefined) return raw.value;
                return String(raw);
            } else if (rule === 'number') {
                const num = parseFloat(raw);
                return isNaN(num) ? '' : num;
            } else {
                return typeof raw === 'object' ? JSON.stringify(raw) : String(raw);
            }
        }
        function formatNumber(val) {
            if (val === '' || val === null || val === undefined) return '';
            const num = parseFloat(val);
            return isNaN(num) ? '' : num.toFixed(2);
        }
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
        }
        function generateLabelHTML(fields, index) {
            let title = extractFieldValue(fields, 'fldtJkkbfh', 'firstText') || '莫比乌斯素金镯';
            let mainStone = extractFieldValue(fields, 'fldbSFpb12', 'firstValue');
            let subStone = extractFieldValue(fields, 'fld4wV6xia', 'direct');
            let goldWeight = extractFieldValue(fields, 'fld6ebcnhJ', 'number');
            let itemWeight = extractFieldValue(fields, 'fldbggr87e', 'firstValue');
            let laborCost = extractFieldValue(fields, 'fld9TBU8tn', 'number');
            let productCode = extractFieldValue(fields, 'fldRKqKb64', 'firstText');
            const barcodeId = `barcode_${Date.now()}_${index}_${Math.random().toString(36).substr(2, 6)}`;
            return {
                html: `
                    <div class="label-card" data-barcode-id="${barcodeId}" data-barcode-code="${escapeHtml(productCode)}">
                        <div class="title">${escapeHtml(title)}</div>
                        <div class="info-list">
                            <div class="info-row"><span class="info-label">主石</span><span class="info-value">${escapeHtml(mainStone)}</span></div>
                            <div class="info-row"><span class="info-label">副石</span><span class="info-value">${escapeHtml(subStone)}</span></div>
                            <div class="info-row"><span class="info-label">金重</span><span class="info-value">${formatNumber(goldWeight)}</span></div>
                            <div class="info-row"><span class="info-label">件重</span><span class="info-value">${formatNumber(itemWeight)}</span></div>
                            <div class="info-row"><span class="info-label">件工费</span><span class="info-value">${formatNumber(laborCost)}</span></div>
                        </div>
                        <div class="barcode-area">
                            <svg id="${barcodeId}"></svg>
                            <div class="barcode-number">${escapeHtml(productCode)}</div>
                        </div>
                    </div>
                `,
                barcodeId,
                productCode
            };
        }
        function renderLabels(recordsArray) {
            const container = document.getElementById('labelsContainer');
            container.innerHTML = '';
            if (!recordsArray.length) {
                container.innerHTML = '<div style="text-align:center; padding:20px;">请点击「选择记录」加载标签</div>';
                return;
            }
            let combinedHtml = '';
            const barcodeItems = [];
            for (let i = 0; i < recordsArray.length; i++) {
                const fields = recordsArray[i].fields;
                const { html, barcodeId, productCode } = generateLabelHTML(fields, i);
                combinedHtml += html;
                barcodeItems.push({ id: barcodeId, code: productCode });
            }
            container.innerHTML = combinedHtml;
            setTimeout(() => {
                barcodeItems.forEach(item => {
                    if (item.code && item.code.trim()) {
                        try {
                            JsBarcode(`#${item.id}`, item.code, {
                                format: "CODE128",
                                width: 0.6,
                                height: 18,
                                displayValue: false,
                                fontSize: 2,
                                margin: 0
                            });
                            console.log(`条形码生成成功: ${item.code}`);
                        } catch(e) { console.warn("条形码生成失败", e); }
                    }
                });
            }, 50);
        }
        async function selectAndLoadData() {
            try {
                if (!window.bitable || !window.bitable.base || !window.bitable.ui) throw new Error('飞书SDK未加载');
                const base = window.bitable.base;
                const selection = await base.getSelection();
                let tableId = selection?.tableId;
                let viewId = selection?.viewId;
                if (!tableId) {
                    const activeTable = await base.getActiveTable();
                    tableId = activeTable?.id;
                    viewId = activeTable?.activeViewId;
                }
                if (!tableId || !viewId) throw new Error('无法获取当前表格或视图');
                const selectedIds = await window.bitable.ui.selectRecordIdList(tableId, viewId);
                if (!selectedIds || selectedIds.length === 0) throw new Error('未选择任何记录');
                console.log('选中的ID列表:', selectedIds);
                const table = await base.getActiveTable();
                let records = [];
                for (let id of selectedIds) {
                    try {
                        let rec = await table.getRecordById(String(id));
                        if (rec) records.push({ recordId: String(id), fields: rec.fields || rec });
                        else console.warn(`getRecordById 返回空: ${id}`);
                    } catch(e) { console.warn(`getRecordById 失败 ${id}:`, e.message); }
                }
                if (records.length !== selectedIds.length) {
                    console.log('尝试从记录列表补全');
                    const recordsData = await table.getRecordList();
                    let recordsArray = [];
                    if (Array.isArray(recordsData)) recordsArray = recordsData;
                    else if (recordsData?.recordList) recordsArray = recordsData.recordList;
                    else if (recordsData?.records) recordsArray = recordsData.records;
                    const existingIds = new Set(records.map(r => String(r.recordId)));
                    for (let rec of recordsArray) {
                        let rid = rec.recordId ?? rec.id ?? rec._id ?? rec.record_id;
                        if (rid) {
                            rid = String(rid);
                            if (selectedIds.some(sid => String(sid) === rid) && !existingIds.has(rid)) {
                                records.push({ recordId: rid, fields: rec.fields || rec });
                                existingIds.add(rid);
                            }
                        }
                    }
                }
                if (records.length === 0) throw new Error('未找到对应的记录');
                selectedRecordsData = records;
                console.log(`成功匹配 ${records.length} 条记录`);
                records.forEach((r, idx) => { console.log(`记录 ${idx+1}:`, r.fields); });
                renderLabels(records);
                showError(`成功加载 ${records.length} 条记录，可批量打印`);
            } catch (err) { console.error(err); showError(err.message); }
        }
        function printLabels() {
            if (!selectedRecordsData.length) { showError('请先选择记录'); return; }
            window.print();
        }
        window.onload = () => {
            document.getElementById('labelsContainer').innerHTML = '<div style="text-align:center; padding:20px;">请点击「选择记录」加载标签</div>';
        };
    </script>
</body>
</html>
